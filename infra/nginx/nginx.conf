upstream frontend_upstream {
  server frontend:80;
}

upstream api_gateway_upstream {
  server api-gateway:3000;
}

upstream collaboration_upstream {
  server collaboration-service:3003;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 25m;
  resolver 127.0.0.11 ipv6=off valid=10s;

  set $frontend_service http://frontend:80;
  set $api_gateway_service http://api-gateway:3000;
  set $collaboration_service http://collaboration-service:3003;

  location /api/ {
    proxy_pass $api_gateway_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass $collaboration_service;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location / {
    proxy_pass $frontend_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
