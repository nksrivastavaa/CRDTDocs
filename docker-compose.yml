services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collab}
      POSTGRES_USER: ${POSTGRES_USER:-collab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collab_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/docker/postgres/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collab} -d ${POSTGRES_DB:-collab}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}; do sleep 2; done;
      mc mb -p local/${AWS_S3_BUCKET:-collab-uploads} || true;
      mc anonymous set download local/${AWS_S3_BUCKET:-collab-uploads};
      printf '[{\"AllowedOrigins\":[\"*\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"POST\"],\"AllowedHeaders\":[\"*\"],\"ExposeHeaders\":[\"ETag\"],\"MaxAgeSeconds\":3000}]' > /tmp/cors.json;
      mc cors set local/${AWS_S3_BUCKET:-collab-uploads} /tmp/cors.json;
      "

  auth-service:
    env_file: .env
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: prod
    environment: &service-env
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-collab}
      DB_USER: ${POSTGRES_USER:-collab}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-collab_password}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-collab-uploads}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://localhost:9000}
      AWS_S3_PUBLIC_URL: ${AWS_S3_PUBLIC_URL:-http://localhost:9000}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"

  document-service:
    env_file: .env
    build:
      context: .
      dockerfile: services/document-service/Dockerfile
      target: prod
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_started
    ports:
      - "3002:3002"

  collaboration-service:
    env_file: .env
    build:
      context: .
      dockerfile: services/collaboration-service/Dockerfile
      target: prod
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3003:3003"

  notification-service:
    env_file: .env
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
      target: prod
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3004:3004"

  api-gateway:
    env_file: .env
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: prod
    environment:
      NODE_ENV: production
      API_GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      DOCUMENT_SERVICE_URL: http://document-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      - auth-service
      - document-service
      - notification-service
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: prod
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    depends_on:
      - api-gateway

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api-gateway
      - collaboration-service

volumes:
  postgres-data:
  redis-data:
  minio-data:
